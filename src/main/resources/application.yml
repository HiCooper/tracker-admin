server:
  port: 8082
  servlet:
    context-path: /

spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  application:
    name: tracker-admin
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TRACKER_DB_URL:jdbc:mysql://localhost:3306/tracker_admin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${TRACKER_DB_USER:root}
    password: ${TRACKER_DB_PASSWORD:}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    connect-retries: 10
    clean-disabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms

# ClickHouse configuration
clickhouse:
  url: ${CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123}
  username: ${CLICKHOUSE_USER:default}
  password: ${CLICKHOUSE_PASSWORD:}

# GateFlow 安全配置
gateflow:
  jwt:
    # 必填:通过环境变量 JWT_SECRET 提供 >=32 字节强密钥(缺失则启动失败);与 tracker-service 共享
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin:
    # 可选:首启初始 admin 密码;未设置则随机生成并在日志打印一次
    initial-password: ${ADMIN_INITIAL_PASSWORD:}
  websocket:
    # 调试 WebSocket 允许的来源白名单(逗号分隔);默认仅本地前端
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  cors:
    # HTTP CORS 允许的来源白名单(逗号分隔)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.gateflow.tracker.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Redis disabled for local dev
# redisson:
#   address: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
#   password: ${REDIS_PASSWORD:}
#   database: 0

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  pattern:
    # 在日志级别字段后附加请求关联 ID(由 RequestIdFilter 写入 MDC)
    level: "%5p [${spring.application.name:tracker-admin},%X{requestId:-}]"
