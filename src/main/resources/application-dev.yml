# 本地开发环境配置
# 激活方式: --spring.profiles.active=dev 或 SPRING_PROFILES_ACTIVE=dev

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/tracker_admin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

clickhouse:
  url: jdbc:clickhouse://127.0.0.1:8123/gateflow_tracker?compress_algorithm=gzip
  username: default
  password: ""

# 仅本地开发使用的 JWT 密钥(>=32 字节);生产必须经 JWT_SECRET 注入
gateflow:
  jwt:
    secret: ${JWT_SECRET:dev-only-gateflow-jwt-secret-key-change-me-32B}

logging:
  level:
    com.gateflow.tracker: DEBUG
